name: ScreenSpan
options:
  bundleIdPrefix: com.screenspan
  deploymentTarget:
    iOS: "17.0"
  swiftVersion: "5.9"

settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"

targets:
  ScreenSpan:
    type: application
    platform: iOS
    sources:
      - path: ScreenSpan
        excludes:
          - "*.entitlements"
          - "Views/Components/DonutChartView.swift"
          - "Views/Components/LifeGridView.swift"
      - path: Shared
    info:
      path: ScreenSpan/Info.plist
      uses: [.plist]
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIAppFonts:
          - GeistVF.ttf
          - GeistItalicVF.ttf
          - GeistMonoVF.ttf
          - GeistMonoItalicVF.ttf
    entitlements:
      path: ScreenSpan/ScreenSpan.entitlements
      uses: [.plist]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.screenspan
      TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - target: ScreenSpanReport
    frameworks:
      - DeviceActivity
      - FamilyControls
      - StoreKit

  ScreenSpanReport:
    type: extensionkit-extension
    platform: iOS
    sources:
      - path: ScreenSpanReport
        excludes:
          - "*.entitlements"
          - "DeviceActivityReport+Contexts.swift"
      - path: Shared
      - path: ScreenSpan/Resources/Fonts/Geist
        buildPhase: resources
    info:
      path: ScreenSpanReport/Info.plist
      uses: [.plist]
      properties:
        UIAppFonts:
          - GeistVF.ttf
          - GeistItalicVF.ttf
          - GeistMonoVF.ttf
          - GeistMonoItalicVF.ttf
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.deviceactivityui.report-extension
    entitlements:
      path: ScreenSpanReport/ScreenSpanReport.entitlements
      uses: [.plist]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.screenspan.deviceactivity
      TARGETED_DEVICE_FAMILY: 1
    frameworks:
      - DeviceActivity
      - FamilyControls
      - ManagedSettings

schemes:
  ScreenSpan:
    build:
      targets:
        ScreenSpan: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
